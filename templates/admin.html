{% extends "layout.html" %}

{% block title %}
    Admin
{% endblock %}

{% block main %}
    <div id="admin-page" style="text-align: center">
        <form action="/admin" method="POST">
            <input type="text" name="title" placeholder="title" autocomplete="off" autofocus><br><br>
            <input type="text" name="author" placeholder="author" autocomplete="off"><br><br>
            <input type="text" name="description" placeholder="description" autocomplete="off"><br><br>
            <input type="text" name="image" placeholder="image" autocomplete="off"><br><br>
            <select name="category">
                {% for category in categories %}
                    <option value="{{ category[0] }}">{{ category[0] }}</option>
                {% endfor %}
            </select><br><br>
            <textarea type="text" name="tips" placeholder="tips" autocomplete="off" rows="20" cols="100"></textarea><br><br>
            <button type="submit">Submit</button>
        </form>
    </div>
{% endblock %}
